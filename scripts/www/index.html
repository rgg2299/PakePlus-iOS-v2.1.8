<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手机汉字拼音打字练习</title>
    <style>
        /* 全局样式重置与基础设置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #f3e5f5);
            min-height: 100vh;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            color: #333;
            touch-action: pan-y;
            overflow-x: hidden;
        }

        /* 顶部统计信息 */
        .stats-bar {
            background: linear-gradient(135deg, #6a89cc, #4a69bd);
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            color: white;
            box-shadow: 0 10px 25px rgba(106, 137, 204, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .stat-item {
            text-align: center;
            flex: 1;
            min-width: 100px;
            margin: 5px;
        }

        .stat-label {
            display: block;
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 5px;
        }

        .stat-value {
            display: block;
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
        }

        /* 模式切换选项卡 */
        .mode-tabs {
            display: flex;
            background: white;
            border-radius: 15px;
            padding: 8px;
            margin-bottom: 25px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.08);
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .mode-tab {
            flex: 1;
            padding: 15px 5px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            background: transparent;
            border: none;
            color: #666;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 0;
            white-space: nowrap;
            margin: 0 4px;
            min-height: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .mode-tab.active {
            background: linear-gradient(135deg, #4776E6, #8E54E9);
            color: white;
            box-shadow: 0 6px 15px rgba(71, 118, 230, 0.4);
        }

        .mode-tab:hover {
            transform: translateY(-2px);
        }

        /* 题库信息卡片 */
        .library-info {
            background: white;
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 25px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .library-title {
            font-size: 18px;
            font-weight: 700;
            color: #4a69bd;
            margin-bottom: 10px;
        }

        .library-count {
            font-size: 28px;
            font-weight: 800;
            color: #2ecc71;
            margin-bottom: 10px;
        }

        .library-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        /* 控制按钮组 */
        .control-buttons {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            margin-top: 15px;
            background: white;
            border-radius: 18px;
            padding: 15px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
        }

        .control-btn {
            flex: 1;
            padding: 18px 10px;
            border-radius: 15px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 60px;
        }

        .control-btn.primary {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            box-shadow: 0 6px 15px rgba(52, 152, 219, 0.3);
        }

        .control-btn.secondary {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
            box-shadow: 0 6px 15px rgba(46, 204, 113, 0.3);
        }

        .control-btn.danger {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            box-shadow: 0 6px 15px rgba(231, 76, 60, 0.3);
        }

        .control-btn:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }

        /* 小型音乐控制栏 */
        .mini-music-controls {
            background: white;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 140px;
            justify-content: center;
        }

        .mini-music-icon {
            width: 40px;
            height: 40px;
            line-height: 40px;
            border-radius: 12px;
            margin: 0 auto 10px;
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            font-size: 20px;
        }

        .mini-music-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            align-items: center;
            margin-top: 5px;
        }

        .mini-music-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(52, 152, 219, 0.3);
            transition: all 0.2s ease;
        }

        .mini-music-btn:hover {
            transform: scale(1.05);
        }

        .mini-music-btn:active {
            transform: scale(0.95);
        }

        #miniMusicToggle {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            box-shadow: 0 2px 8px rgba(155, 89, 182, 0.3);
        }

        .mini-music-info {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .mini-volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }

        #miniVolumeSlider {
            width: 120px;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
            -webkit-appearance: none;
        }

        #miniVolumeSlider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #3498db;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        #miniVolumeValue {
            font-size: 12px;
            color: #666;
            min-width: 30px;
            text-align: center;
        }



        /* 题目显示区域 */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            text-align: center;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .question-header {
            margin-bottom: 20px;
        }

        .question-number {
            font-size: 16px;
            color: #666;
            margin-bottom: 10px;
        }

        .question-progress {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 16px;
            color: #666;
        }

        .progress-bar {
            width: 200px;
            height: 8px;
            background: #ecf0f1;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            width: 0%;
            transition: width 0.5s ease;
        }

        /* 拼音显示区域 */
        .pinyin-display {
            margin-bottom: 30px;
            line-height: 1.8;
        }

        .pinyin-word {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin: 0 8px;
            position: relative;
        }

        .pinyin-text {
            font-size: 14px;
            color: #e74c3c;
            font-weight: 600;
            margin-bottom: 4px;
            padding: 4px 8px;
            background: rgba(231, 76, 60, 0.1);
            border-radius: 8px;
            min-width: 40px;
        }

        .hanzi-text {
            font-size: 32px;
            font-weight: 800;
            color: #2c3e50;
            min-width: 40px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 12px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        /* 句子练习样式 - 字体较小，适合长句子 */
        .sentence-mode .hanzi-text {
            font-size: 24px;
            min-width: 32px;
            padding: 6px;
            border-radius: 10px;
        }

        .sentence-mode .pinyin-text {
            font-size: 12px;
            padding: 3px 6px;
            margin-bottom: 2px;
        }

        .sentence-mode .pinyin-display {
            margin-bottom: 20px;
        }

        .sentence-mode .pinyin-word {
            margin: 0 5px;
        }

        /* 单字练习样式 - 保持原样 */
        .single-mode .hanzi-text {
            font-size: 32px;
        }

        /* 三字练习样式 */
        .triple-mode .hanzi-text {
            font-size: 28px;
            min-width: 36px;
            padding: 7px;
        }

        .triple-mode .pinyin-text {
            font-size: 13px;
        }

        /* 成语练习样式 */
        .idiom-mode .hanzi-text {
            font-size: 28px;
            min-width: 36px;
            padding: 7px;
        }

        .idiom-mode .pinyin-text {
            font-size: 13px;
        }

        /* 输入区域 */
        .input-container {
            margin-bottom: 20px;
            margin-top: 10px;
        }

        .input-field {
            width: 100%;
            padding: 20px;
            font-size: 20px;
            border: 3px solid #3498db;
            border-radius: 18px;
            text-align: center;
            outline: none;
            transition: all 0.3s ease;
            font-weight: 600;
            letter-spacing: 2px;
            background: white;
            box-shadow: 0 8px 20px rgba(52, 152, 219, 0.15);
        }

        .input-field:focus {
            border-color: #8E54E9;
            box-shadow: 0 8px 25px rgba(142, 84, 233, 0.25);
        }

        .input-field.error {
            border-color: #e74c3c;
            background: rgba(231, 76, 60, 0.05);
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            transform: translate3d(0, 0, 0);
            backface-visibility: hidden;
            perspective: 1000px;
        }

        .input-field.correct {
            border-color: #2ecc71;
            background: rgba(46, 204, 113, 0.1);
            animation: pulse 1s ease;
            box-shadow: 0 8px 25px rgba(46, 204, 113, 0.3);
            border-width: 4px;
        }

        .input-hint {
            text-align: center;
            font-size: 14px;
            color: #666;
            margin-top: 12px;
        }

        /* 反馈消息 */
        .feedback-message {
            text-align: center;
            padding: 20px;
            border-radius: 18px;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: 600;
            animation: fadeIn 0.5s ease;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .feedback-message.correct {
            background: linear-gradient(135deg, #2ecc71, #27ae60);
            color: white;
        }

        .feedback-message.error {
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
        }

        .feedback-message.complete {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
            font-size: 22px;
        }

        /* 底部功能区域 */
        .extra-features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }

        .feature-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.08);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .feature-card:active {
            transform: scale(0.98);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        }

        .feature-icon {
            font-size: 24px;
            margin-bottom: 10px;
            width: 50px;
            height: 50px;
            line-height: 50px;
            border-radius: 12px;
            margin: 0 auto 15px;
        }

        .feature-card:nth-child(1) .feature-icon {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }

        .feature-card:nth-child(2) .feature-icon {
            background: linear-gradient(135deg, #f39c12, #d35400);
            color: white;
        }

        .feature-card:nth-child(3) .feature-icon {
            background: linear-gradient(135deg, #9b59b6, #8e44ad);
            color: white;
        }

        .feature-card:nth-child(4) .feature-icon {
            background: linear-gradient(135deg, #1abc9c, #16a085);
            color: white;
        }

        .feature-title {
            font-size: 16px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .feature-desc {
            font-size: 12px;
            color: #666;
            line-height: 1.4;
        }

        /* 动画定义 */
        @keyframes shake {
            10%, 90% {
                transform: translate3d(-1px, 0, 0);
            }
            20%, 80% {
                transform: translate3d(2px, 0, 0);
            }
            30%, 50%, 70% {
                transform: translate3d(-4px, 0, 0);
            }
            40%, 60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
            100% {
                transform: scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .mode-tab {
                font-size: 14px;
                padding: 12px 5px;
                min-height: 55px;
            }
            
            .hanzi-text {
                font-size: 28px;
                min-width: 35px;
            }
            
            .pinyin-text {
                font-size: 12px;
                min-width: 35px;
            }
            
            .control-btn {
                font-size: 14px;
                padding: 15px 8px;
                min-height: 55px;
            }
            
            .stat-value {
                font-size: 20px;
            }
        }

        @media (max-width: 360px) {
            .mode-tabs {
                flex-direction: column;
            }
            
            .mode-tab {
                margin: 4px 0;
            }
            
            .extra-features {
                grid-template-columns: 1fr;
            }
            
            .hanzi-text {
                font-size: 24px;
                min-width: 30px;
            }
        }

        /* 模式特定颜色 */
        .mode-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .mode-single .mode-indicator { background: #3498db; }
        .mode-triple .mode-indicator { background: #2ecc71; }
        .mode-sentence .mode-indicator { background: #9b59b6; }
        .mode-idiom .mode-indicator { background: #f39c12; }

        /* 加载动画 */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(52, 152, 219, 0.1);
            border-top: 4px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 隐藏元素 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- 顶部统计信息 -->
    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-label">当前得分</span>
            <span class="stat-value" id="currentScore">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">正确率</span>
            <span class="stat-value" id="accuracyRate">0%</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">当前题号</span>
            <span class="stat-value" id="currentQuestion">1/10</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">已用时间</span>
            <span class="stat-value" id="elapsedTime">0s</span>
        </div>
    </div>

    <!-- 模式切换选项卡 -->
    <div class="mode-tabs">
        <button class="mode-tab active" data-mode="single" onclick="switchMode('single')">
            <span class="mode-indicator mode-single"></span>
            <span>单字练习</span>
            <small>150+ 汉字</small>
        </button>
        <button class="mode-tab" data-mode="triple" onclick="switchMode('triple')">
            <span class="mode-indicator mode-triple"></span>
            <span>三字练习</span>
            <small>120+ 词语</small>
        </button>
        <button class="mode-tab" data-mode="sentence" onclick="switchMode('sentence')">
            <span class="mode-indicator mode-sentence"></span>
            <span>句子练习</span>
            <small>100+ 句子</small>
        </button>
        <button class="mode-tab" data-mode="idiom" onclick="switchMode('idiom')">
            <span class="mode-indicator mode-idiom"></span>
            <span>成语练习</span>
            <small>100+ 成语</small>
        </button>
    </div>

    <!-- 题目显示区域 -->
    <div class="question-card" id="questionCard">
        <div class="question-header">
            <div class="question-number" id="questionNumber">第 1 题</div>
            <div class="question-progress">
                <span id="progressText">1 / 10</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
        </div>
        
        <div class="pinyin-display" id="pinyinDisplay">
            <!-- 拼音和汉字将通过JS动态生成 -->
            <div class="loading">
                <div class="loading-spinner"></div>
            </div>
        </div>
    </div>

    <!-- 反馈消息 -->
    <div class="feedback-message hidden" id="feedbackMessage"></div>

    <!-- 输入区域 -->
    <div class="input-container">
        <input type="text" 
               class="input-field" 
               id="userInput" 
               placeholder="根据拼音输入对应汉字..." 
               autocomplete="off" 
               autofocus
               onkeypress="handleKeyPress(event)">
        <div class="input-hint">拼音找@小橘美美</div>
    </div>
    </div>

    <!-- 控制按钮 -->
    <div class="control-buttons">
        <button class="control-btn secondary" onclick="shuffleQuestions()">
            <span>🔄 换一批</span>
        </button>
        <button class="control-btn danger" onclick="resetProgress()">
            <span>🔄 重新开始</span>
        </button>
    </div>

    <!-- 额外功能区域 -->
    <div class="extra-features">
        <div class="mini-music-controls">
            <div class="mini-music-icon" id="miniMusicIcon" onclick="toggleMusic()">🎵</div>
            <div class="mini-music-buttons">
                <button class="mini-music-btn" id="miniMusicPrev" onclick="prevMusic()">
                    <span>⏮️</span>
                </button>
                <button class="mini-music-btn" id="miniMusicPlayPause" onclick="togglePlayPause()">
                    <span id="miniPlayPauseIcon">▶️</span>
                </button>
                <button class="mini-music-btn" id="miniMusicNext" onclick="nextMusic()">
                    <span>⏭️</span>
                </button>
            </div>
            <div class="mini-volume-control">
                <input type="range" id="miniVolumeSlider" min="0" max="100" value="50" 
                       oninput="changeVolume(this.value)">
                <span id="miniVolumeValue">50%</span>
            </div>
            <div class="mini-music-info">
                <span id="miniCurrentMusic">人间清醒.MP3</span>
            </div>
        </div>
        <div class="feature-card" onclick="showErrorList()">
            <div class="feature-icon">📝</div>
            <div class="feature-title">错题本</div>
            <div class="feature-desc">查看答错的题目</div>
        </div>
        <div class="feature-card" onclick="toggleDifficulty()">
            <div class="feature-icon">⚙️</div>
            <div class="feature-title">难度切换</div>
            <div class="feature-desc">简单/困难模式</div>
        </div>
        <div class="feature-card" onclick="showStats()">
            <div class="feature-icon">📊</div>
            <div class="feature-title">统计信息</div>
            <div class="feature-desc">详细练习数据</div>
        </div>
    </div>
    </div>

    <!-- 题库信息 -->
    <div class="library-info">
        <div class="library-title" id="libraryTitle">单字题库</div>
        <div class="library-count" id="libraryCount">100+ 题目</div>
        <div class="library-desc" id="libraryDesc">覆盖常用汉字，包含多音字示例</div>
    </div>

    <script>
        // ============================================
        // 题库数据配置
        // ============================================
        
        // 汉字到拼音的多音字映射表

{ hanzi: '功夫不负有心人。', pinyin: 'gōng fū bù fù yǒu xīn rén.' },
{ hanzi: '吃得苦中苦，方为人上人。', pinyin: 'chī dé kǔ zhōng kǔ, fāng wéi rén shàng rén.' },
{ hanzi: '只要功夫深，铁杵磨成针。', pinyin: 'zhǐ yào gōng fū shēn, tiě chǔ mó chéng zhēn.' },
{ hanzi: '百尺竿头，更进一步。', pinyin: 'bǎi chǐ gān tóu, gèng jìn yī bù.' },
{ hanzi: '乘风破浪会有时，直挂云帆济沧海。', pinyin: 'chéng fēng pò làng huì yǒu shí, zhí guà yún fān jì cāng hǎi.' },
{ hanzi: '会当水击三千里，自信人生二百年。', pinyin: 'huì dāng shuǐ jī sān qiān lǐ, zì xìn rén shēng èr bǎi nián.' },
{ hanzi: '不积跬步，无以至千里。', pinyin: 'bù jī kuǐ bù, wú yǐ zhì qiān lǐ.' },
{ hanzi: '不积小流，无以成江海。', pinyin: 'bù jī xiǎo liú, wú yǐ chéng jiāng hǎi.' },
{ hanzi: '天行健，君子以自强不息。', pinyin: 'tiān xíng jiàn, jūn zǐ yǐ zì qiáng bù xī.' },
{ hanzi: '地势坤，君子以厚德载物。', pinyin: 'dì shì kūn, jūn zǐ yǐ hòu dé zài wù.' },
{ hanzi: '学然后知不足，教然后知困。', pinyin: 'xué rán hòu zhī bù zú, jiāo rán hòu zhī kùn.' },
{ hanzi: '知不足然后能自反也。', pinyin: 'zhī bù zú rán hòu néng zì fǎn yě.' },
{ hanzi: '博学之，审问之，慎思之，明辨之，笃行之。', pinyin: 'bó xué zhī, shěn wèn zhī, shèn sī zhī, míng biàn zhī, dǔ xíng zhī.' },
{ hanzi: '玉不琢，不成器；人不学，不知道。', pinyin: 'yù bù zhuó, bù chéng qì; rén bù xué, bù zhī dào.' },
{ hanzi: '博观而约取，厚积而薄发。', pinyin: 'bó guān ér yuē qǔ, hòu jī ér báo fā.' },
{ hanzi: '山不在高，有仙则名；水不在深，有龙则灵。', pinyin: 'shān bù zài gāo, yǒu xiān zé míng; shuǐ bù zài shēn, yǒu lóng zé líng.' },
{ hanzi: '黑发不知勤学早，白首方悔读书迟。', pinyin: 'hēi fà bù zhī qín xué zǎo, bái shǒu fāng huǐ dú shū chí.' },
{ hanzi: '莫等闲，白了少年头，空悲切。', pinyin: 'mò děng xián, bái le shào nián tóu, kōng bēi qiè.' },
{ hanzi: '三十功名尘与土，八千里路云和月。', pinyin: 'sān shí gōng míng chén yǔ tǔ, bā qiān lǐ lù yún hé yuè.' },
{ hanzi: '少年易老学难成，一寸光阴不可轻。', pinyin: 'shào nián yì lǎo xué nán chéng, yī cùn guāng yīn bù kě qīng.' },
{ hanzi: '未觉池塘春草梦，阶前梧叶已秋声。', pinyin: 'wèi jué chí táng chūn cǎo mèng, jiē qián wú yè yǐ qiū shēng.' },
{ hanzi: '及时当勉励，岁月不待人。', pinyin: 'jí shí dāng miǎn lì, suì yuè bù dài rén.' },
{ hanzi: '盛年不重来，一日难再晨。', pinyin: 'shèng nián bù chóng lái, yī rì nán zài chén.' },
{ hanzi: '青春须早为，岂能长少年。', pinyin: 'qīng chūn xū zǎo wéi, qǐ néng cháng shào nián.' },
{ hanzi: '明日复明日，明日何其多。', pinyin: 'míng rì fù míng rì, míng rì hé qí duō.' },
{ hanzi: '我生待明日，万事成蹉跎。', pinyin: 'wǒ shēng dài míng rì, wàn shì chéng cuō tuó.' },
{ hanzi: '世人若被明日累，春去秋来老将至。', pinyin: 'shì rén ruò bèi míng rì lèi, chūn qù qiū lái lǎo jiāng zhì.' },
{ hanzi: '朝看水东流，暮看日西坠。', pinyin: 'zhāo kàn shuǐ dōng liú, mù kàn rì xī zhuì.' },
{ hanzi: '百年明日能几何，请君听我明日歌。', pinyin: 'bǎi nián míng rì néng jǐ hé, qǐng jūn tīng wǒ míng rì gē.' },
{ hanzi: '花开堪折直须折，莫待无花空折枝。', pinyin: 'huā kāi kān zhé zhí xū zhé, mò dài wú huā kōng zhé zhī.' },
{ hanzi: '健康是人生最大的财富。', pinyin: 'jiàn kāng shì rén shēng zuì dà de cái fù.' },
{ hanzi: '家和万事兴，人睦百业旺。', pinyin: 'jiā hé wàn shì xìng, rén mù bǎi yè wàng.' },
{ hanzi: '赠人玫瑰，手有余香。', pinyin: 'zèng rén méi guī, shǒu yǒu yú xiāng.' },
{ hanzi: '笑一笑，十年少；愁一愁，白了头。', pinyin: 'xiào yī xiào, shí nián shào; chóu yī chóu, bái le tóu.' },
{ hanzi: '滴水之恩，当涌泉相报。', pinyin: 'dī shuǐ zhī ēn, dāng yǒng quán xiāng bào.' },
{ hanzi: '忍一时风平浪静，退一步海阔天空。', pinyin: 'rěn yī shí fēng píng làng jìng, tuì yī bù hǎi kuò tiān kōng.' },
{ hanzi: '近朱者赤，近墨者黑。', pinyin: 'jìn zhū zhě chì, jìn mò zhě hēi.' },
{ hanzi: '己所不欲，勿施于人。', pinyin: 'jǐ suǒ bù yù, wù shī yú rén.' },
{ hanzi: '天时不如地利，地利不如人和。', pinyin: 'tiān shí bù rú dì lì, dì lì bù rú rén hé.' },
{ hanzi: '尺有所短，寸有所长。', pinyin: 'chǐ yǒu suǒ duǎn, cùn yǒu suǒ cháng.' },
{ hanzi: '金无足赤，人无完人。', pinyin: 'jīn wú zú chì, rén wú wán rén.' },
{ hanzi: '言必信，行必果。', pinyin: 'yán bì xìn, xíng bì guǒ.' },
{ hanzi: '学而不思则罔，思而不学则殆。', pinyin: 'xué ér bù sī zé wǎng, sī ér bù xué zé dài.' },
{ hanzi: '知之为知之，不知为不知，是知也。', pinyin: 'zhī zhī wéi zhī zhī, bù zhī wéi bù zhī, shì zhī yě.' },
{ hanzi: '三人行，必有我师焉。', pinyin: 'sān rén xíng, bì yǒu wǒ shī yān.' },
{ hanzi: '当局者迷，旁观者清。', pinyin: 'dāng jú zhě mí, páng guān zhě qīng.' },
{ hanzi: '善有善报，恶有恶报。', pinyin: 'shàn yǒu shàn bào, è yǒu è bào.' },
{ hanzi: '公道自在人心。', pinyin: 'gōng dào zì zài rén xīn.' },
{ hanzi: '人无远虑，必有近忧。', pinyin: 'rén wú yuǎn lǜ, bì yǒu jìn yōu.' },
{ hanzi: '一言既出，驷马难追。', pinyin: 'yī yán jì chū, sì mǎ nán zhuī.' },
{ hanzi: '天网恢恢，疏而不漏。', pinyin: 'tiān wǎng huī huī, shū ér bù lòu.' },
{ hanzi: '有理走遍天下，无理寸步难行。', pinyin: 'yǒu lǐ zǒu biàn tiān xià, wú lǐ cùn bù nán xíng.' },
{ hanzi: '不听老人言，吃亏在眼前。', pinyin: 'bù tīng lǎo rén yán, chī kuī zài yǎn qián.' },
{ hanzi: '塞翁失马，焉知非福。', pinyin: 'sài wēng shī mǎ, yān zhī fēi fú.' },
{ hanzi: '吃一堑，长一智。', pinyin: 'chī yī qiàn, zhǎng yī zhì.' },
{ hanzi: '良药苦口利于病，忠言逆耳利于行。', pinyin: 'liáng yào kǔ kǒu lì yú bìng, zhōng yán nì ěr lì yú xíng.' },
{ hanzi: '酒逢知己千杯少，话不投机半句多。', pinyin: 'jiǔ féng zhī jǐ qiān bēi shǎo, huà bù tóu jī bàn jù duō.' },
{ hanzi: '路遥知马力，日久见人心。', pinyin: 'lù yáo zhī mǎ lì, rì jiǔ jiàn rén xīn.' },
{ hanzi: '树欲静而风不止，子欲养而亲不待。', pinyin: 'shù yù jìng ér fēng bù zhǐ, zǐ yù yǎng ér qīn bù dài.' },
{ hanzi: '养不教，父之过；教不严，师之惰。', pinyin: 'yǎng bù jiāo, fù zhī guò; jiāo bù yán, shī zhī duò.' },
{ hanzi: '玉不琢，不成器；人不学，不知义。', pinyin: 'yù bù zhuó, bù chéng qì; rén bù xué, bù zhī yì.' },
{ hanzi: '为人性僻耽佳句，语不惊人死不休。', pinyin: 'wéi rén xìng pì dān jiā jù, yǔ bù jīng rén sǐ bù xiū.' },
{ hanzi: '鸟欲高飞先振翅，人求上进先读书。', pinyin: 'niǎo yù gāo fēi xiān zhèn chì, rén qiú shàng jìn xiān dú shū.' },
{ hanzi: '书到用时方恨少，事非经过不知难。', pinyin: 'shū dào yòng shí fāng hèn shǎo, shì fēi jīng guò bù zhī nán.' },
{ hanzi: '临渊羡鱼，不如退而结网。', pinyin: 'lín yuān xiàn yú, bù rú tuì ér jié wǎng.' },
{ hanzi: '工欲善其事，必先利其器。', pinyin: 'gōng yù shàn qí shì, bì xiān lì qí qì.' },
{ hanzi: '欲速则不达，见小利则大事不成。', pinyin: 'yù sù zé bù dá, jiàn xiǎo lì zé dà shì bù chéng.' },
{ hanzi: '小不忍则乱大谋。', pinyin: 'xiǎo bù rěn zé luàn dà móu.' },
{ hanzi: '海纳百川，有容乃大；壁立千仞，无欲则刚。', pinyin: 'hǎi nà bǎi chuān, yǒu róng nǎi dà; bì lì qiān rèn, wú yù zé gāng.' },
{ hanzi: '先天下之忧而忧，后天下之乐而乐。', pinyin: 'xiān tiān xià zhī yōu ér yōu, hòu tiān xià zhī lè ér lè.' },
{ hanzi: '静以修身，俭以养德。', pinyin: 'jìng yǐ xiū shēn, jiǎn yǐ yǎng dé.' },
{ hanzi: '非淡泊无以明志，非宁静无以致远。', pinyin: 'fēi dàn bó wú yǐ míng zhì, fēi níng jìng wú yǐ zhì yuǎn.' },
{ hanzi: '夫君子之行，静以修身，俭以养德。', pinyin: 'fū jūn zǐ zhī xíng, jìng yǐ xiū shēn, jiǎn yǐ yǎng dé.' },
{ hanzi: '非学无以广才，非志无以成学。', pinyin: 'fēi xué wú yǐ guǎng cái, fēi zhì wú yǐ chéng xué.' },
{ hanzi: '淫慢则不能励精，险躁则不能冶性。', pinyin: 'yín màn zé bù néng lì jīng, xiǎn zào zé bù néng yě xìng.' },
{ hanzi: '年与时驰，意与日去，遂成枯落，多不接世。', pinyin: 'nián yǔ shí chí, yì yǔ rì qù, suì chéng kū luò, duō bù jiē shì.' },
{ hanzi: '悲守穷庐，将复何及！', pinyin: 'bēi shǒu qióng lú, jiāng fù hé jí!' },
{ hanzi: '人非圣贤，孰能无过？', pinyin: 'rén fēi shèng xián, shú néng wú guò?' },
{ hanzi: '过而能改，善莫大焉。', pinyin: 'guò ér néng gǎi, shàn mò dà yān.' },
{ hanzi: '知错能改，善莫大焉。', pinyin: 'zhī cuò néng gǎi, shàn mò dà yān.' },
{ hanzi: '时间就是金钱，效率就是生命。', pinyin: 'shí jiān jiù shì jīn qián, xiào lǜ jiù shì shēng mìng.' },
{ hanzi: '机会总是留给有准备的人。', pinyin: 'jī huì zǒng shì liú gěi yǒu zhǔn bèi de rén.' },
{ hanzi: '细节决定成败，态度决定一切。', pinyin: 'xì jié jué dìng chéng bài, tài dù jué dìng yī qiè.' },
{ hanzi: '只有不断学习，才能不断进步。', pinyin: 'zhǐ yǒu bù duàn xué xí, cái néng bù duàn jìn bù.' },
{ hanzi: '团结就是力量，合作才能共赢。', pinyin: 'tuán jié jiù shì lì liàng, hé zuò cái néng gòng yíng.' },
{ hanzi: '创新是企业发展的不竭动力。', pinyin: 'chuàng xīn shì qǐ yè fā zhǎn de bù jié dòng lì.' },
{ hanzi: '质量是企业的生命线。', pinyin: 'zhì liàng shì qǐ yè de shēng mìng xiàn.' },
{ hanzi: '诚信是立身之本，立业之基。', pinyin: 'chéng xìn shì lì shēn zhī běn, lì yè zhī jī.' },
{ hanzi: '客户就是上帝，服务创造价值。', pinyin: 'kè hù jiù shì shàng dì, fú wù chuàng zào jià zhí.' },
{ hanzi: '知识就是力量，智慧改变人生。', pinyin: 'zhī shì jiù shì lì liàng, zhì huì gǎi biàn rén shēng.' },
{ hanzi: '梦想还是要有的，万一实现了呢。', pinyin: 'mèng xiǎng hái shì yào yǒu de, wàn yī shí xiàn le ne.' },
{ hanzi: '活在当下，珍惜眼前。', pinyin: 'huó zài dāng xià, zhēn xī yǎn qián.' },
{ hanzi: '最好的投资就是投资自己。', pinyin: 'zuì hǎo de tóu zī jiù shì tóu zī zì jǐ.' },
{ hanzi: '健康是1，其他都是0。', pinyin: 'jiàn kāng shì yī, qí tā dōu shì líng.' },
{ hanzi: '成功没有捷径，唯有坚持和努力。', pinyin: 'chéng gōng méi yǒu jié jìng, wéi yǒu jiān chí hé nǔ lì.' },
{ hanzi: '失败并不可怕，可怕的是放弃。', pinyin: 'shī bài bìng bù kě pà, kě pà de shì fàng qì.' },
{ hanzi: '困难像弹簧，你强它就弱。', pinyin: 'kùn nán xiàng tán huáng, nǐ qiáng tā jiù ruò.' },
{ hanzi: '没有比人更高的山，没有比脚更长的路。', pinyin: 'méi yǒu bǐ rén gèng gāo de shān, méi yǒu bǐ jiǎo gèng cháng de lù.' },
{ hanzi: '人生如逆旅，我亦是行人。', pinyin: 'rén shēng rú nì lǚ, wǒ yì shì xíng rén.' },
{ hanzi: '不忘初心，方得始终。', pinyin: 'bù wàng chū xīn, fāng dé shǐ zhōng.' },
{ hanzi: '以梦为马，不负韶华。', pinyin: 'yǐ mèng wéi mǎ, bù fù sháo huá.' },
{ hanzi: '生命不息，奋斗不止。', pinyin: 'shēng mìng bù xī, fèn dòu bù zhǐ.' },
{ hanzi: '有志者自有千计万计，无志者只感千难万难。', pinyin: 'yǒu zhì zhě zì yǒu qiān jì wàn jì, wú zhì zhě zhǐ gǎn qiān nán wàn nán.' },
{ hanzi: '阳光总在风雨后，彩虹总在乌云后。', pinyin: 'yáng guāng zǒng zài fēng yǔ hòu, cǎi hóng zǒng zài wū yún hòu.' },
{ hanzi: '每一个不曾起舞的日子，都是对生命的辜负。', pinyin: 'měi yī gè bù céng qǐ wǔ de rì zi, dōu shì duì shēng mìng de gū fù.' },
{ hanzi: '我们都在阴沟里，但仍有人仰望星空。', pinyin: 'wǒ men dōu zài yīn gōu lǐ, dàn réng yǒu rén yǎng wàng xīng kōng.' },
{ hanzi: '生活不止眼前的苟且，还有诗和远方。', pinyin: 'shēng huó bù zhǐ yǎn qián de gǒu qiě, hái yǒu shī hé yuǎn fāng.' },
{ hanzi: '你若盛开，蝴蝶自来。', pinyin: 'nǐ ruò shèng kāi, hú dié zì lái.' },
{ hanzi: '一切都是最好的安排。', pinyin: 'yī qiè dōu shì zuì hǎo de ān pái.' },
{ hanzi: '得之坦然，失之淡然，顺其自然，争其必然。', pinyin: 'dé zhī tǎn rán, shī zhī dàn rán, shùn qí zì rán, zhēng qí bì rán.' },
{ hanzi: '要么旅行，要么读书，身体和灵魂总有一个在路上。', pinyin: 'yào me lǚ xíng, yào me dú shū, shēn tǐ hé líng hún zǒng yǒu yī gè zài lù shàng.' },
{ hanzi: '面朝大海，春暖花开。', pinyin: 'miàn cháo dà hǎi, chūn nuǎn huā kāi.' },
{ hanzi: '从明天起，做一个幸福的人。', pinyin: 'cóng míng tiān qǐ, zuò yī gè xìng fú de rén.' },
{ hanzi: '喂马，劈柴，周游世界。', pinyin: 'wèi mǎ, pī chái, zhōu yóu shì jiè.' },
{ hanzi: '我只愿面朝大海，春暖花开。', pinyin: 'wǒ zhǐ yuàn miàn cháo dà hǎi, chūn nuǎn huā kāi.' },
{ hanzi: '黑夜给了我黑色的眼睛，我却用它寻找光明。', pinyin: 'hēi yè gěi le wǒ hēi sè de yǎn jīng, wǒ què yòng tā xún zhǎo guāng míng.' },
{ hanzi: '卑鄙是卑鄙者的通行证，高尚是高尚者的墓志铭。', pinyin: 'bēi bǐ shì bēi bǐ zhě de tōng xíng zhèng, gāo shàng shì gāo shàng zhě de mù zhì míng.' },
{ hanzi: '我相信，那一切都是种子。只有经过埋葬，才有生机。', pinyin: 'wǒ xiāng xìn, nà yī qiè dōu shì zhǒng zi. zhǐ yǒu jīng guò mái zàng, cái yǒu shēng jī.' },
{ hanzi: '有时候，坚持了你最不想干的事情之后，便可得到你最想要的东西。', pinyin: 'yǒu shí hòu, jiān chí le nǐ zuì bù xiǎng gàn de shì qing zhī hòu, biàn kě dé dào nǐ zuì xiǎng yào de dōng xi.' },
{ hanzi: '人生没有白走的路，每一步都算数。', pinyin: 'rén shēng méi yǒu bái zǒu de lù, měi yī bù dōu suàn shù.' },
{ hanzi: '生活不会辜负每一个认真的人。', pinyin: 'shēng huó bù huì gū fù měi yī gè rèn zhēn de rén.' },
{ hanzi: '努力不一定成功，但不努力一定不会成功。', pinyin: 'nǔ lì bù yī dìng chéng gōng, dàn bù nǔ lì yī dìng bù huì chéng gōng.' },
{ hanzi: '世上没有绝望的处境，只有对处境绝望的人。', pinyin: 'shì shàng méi yǒu jué wàng de chǔ jìng, zhǐ yǒu duì chǔ jìng jué wàng de rén.' },
{ hanzi: '一个人的价值，应该看他贡献什么，而不应当看他取得什么。', pinyin: 'yī gè rén de jià zhí, yīng gāi kàn tā gòng xiàn shén me, ér bù yīng dāng kàn tā qǔ dé shén me.' },
{ hanzi: '生活就像海洋，只有意志坚强的人，才能到达彼岸。', pinyin: 'shēng huó jiù xiàng hǎi yáng, zhǐ yǒu yì zhì jiān qiáng de rén, cái néng dào dá bǐ àn.' },
{ hanzi: '理想是石，敲出星星之火；理想是火，点燃熄灭的灯。', pinyin: 'lǐ xiǎng shì shí, qiāo chū xīng xīng zhī huǒ; lǐ xiǎng shì huǒ, diǎn rán xī miè de dēng.' },
{ hanzi: '理想是灯，照亮夜行的路；理想是路，引你走到黎明。', pinyin: 'lǐ xiǎng shì dēng, zhào liàng yè xíng de lù; lǐ xiǎng shì lù, yǐn nǐ zǒu dào lí míng.' },
{ hanzi: '世界上最快乐的事，莫过于为理想而奋斗。', pinyin: 'shì jiè shàng zuì kuài lè de shì, mò guò yú wèi lǐ xiǎng ér fèn dòu.' },
{ hanzi: '现实是此岸，理想是彼岸，中间隔着湍急的河流，行动则是架在川上的桥梁。', pinyin: 'xiàn shí shì cǐ àn, lǐ xiǎng shì bǐ àn, zhōng jiān gé zhe tuān jí de hé liú, xíng dòng zé shì jià zài chuān shàng de qiáo liáng.' },
{ hanzi: '一个人的价值，应当看他贡献什么，而不应当看他取得什么。', pinyin: 'yī gè rén de jià zhí, yīng dāng kàn tā gòng xiàn shén me, ér bù yīng dāng kàn tā qǔ dé shén me.' },
{ hanzi: '朋友一生一起走，那些日子不再有。', pinyin: 'péng yǒu yī shēng yī qǐ zǒu, nà xiē rì zi bù zài yǒu.' },
{ hanzi: '一句话，一辈子，一生情，一杯酒。', pinyin: 'yī jù huà, yī bèi zi, yī shēng qíng, yī bēi jiǔ.' },
{ hanzi: '朋友不曾孤单过，一声朋友你会懂。', pinyin: 'péng yǒu bù céng gū dān guò, yī shēng péng yǒu nǐ huì dǒng.' },
{ hanzi: '还有伤，还有痛，还要走，还有我。', pinyin: 'hái yǒu shāng, hái yǒu tòng, hái yào zǒu, hái yǒu wǒ.' },
{ hanzi: '朋友啊朋友，你可曾想起了我？', pinyin: 'péng yǒu a péng yǒu, nǐ kě céng xiǎng qǐ le wǒ?' },
{ hanzi: '如果你正享受幸福，请你忘记我。', pinyin: 'rú guǒ nǐ zhèng xiǎng shòu xìng fú, qǐng nǐ wàng jì wǒ.' },
{ hanzi: '如果你正承受不幸，请你告诉我。', pinyin: 'rú guǒ nǐ zhèng chéng shòu bù xìng, qǐng nǐ gào sù wǒ.' },
{ hanzi: '父爱如山，母爱如海。', pinyin: 'fù ài rú shān, mǔ ài rú hǎi.' },
{ hanzi: '谁言寸草心，报得三春晖。', pinyin: 'shuí yán cùn cǎo xīn, bào dé sān chūn huī.' },
{ hanzi: '慈母手中线，游子身上衣。', pinyin: 'cí mǔ shǒu zhōng xiàn, yóu zǐ shēn shàng yī.' },
{ hanzi: '临行密密缝，意恐迟迟归。', pinyin: 'lín xíng mì mì féng, yì kǒng chí chí guī.' },
{ hanzi: '父母在，不远游，游必有方。', pinyin: 'fù mǔ zài, bù yuǎn yóu, yóu bì yǒu fāng.' },
{ hanzi: '父母之年，不可不知也。', pinyin: 'fù mǔ zhī nián, bù kě bù zhī yě.' },
{ hanzi: '一则以喜，一则以惧。', pinyin: 'yī zé yǐ xǐ, yī zé yǐ jù.' },
{ hanzi: '今之孝者，是谓能养。', pinyin: 'jīn zhī xiào zhě, shì wèi néng yǎng.' },
{ hanzi: '至于犬马，皆能有养；不敬，何以别乎？', pinyin: 'zhì yú quǎn mǎ, jiē néng yǒu yǎng; bù jìng, hé yǐ bié hū?' },
{ hanzi: '色难。有事，弟子服其劳；有酒食，先生馔，曾是以为孝乎？', pinyin: 'sè nán. yǒu shì, dì zǐ fú qí láo; yǒu jiǔ shí, xiān shēng zhuàn, céng shì yǐ wéi xiào hū?' },
{ hanzi: '老吾老，以及人之老；幼吾幼，以及人之幼。', pinyin: 'lǎo wú lǎo, yǐ jí rén zhī lǎo; yòu wú yòu, yǐ jí rén zhī yòu.' },
{ hanzi: '家有一老，如有一宝。', pinyin: 'jiā yǒu yī lǎo, rú yǒu yī bǎo.' },
{ hanzi: '家和万事兴，家齐国安宁。', pinyin: 'jiā hé wàn shì xìng, jiā qí guó ān níng.' },
{ hanzi: '兄弟姐妹，血浓于水。', pinyin: 'xiōng dì jiě mèi, xuè nóng yú shuǐ.' },
{ hanzi: '有福同享，有难同当。', pinyin: 'yǒu fú tóng xiǎng, yǒu nàn tóng dāng.' },
{ hanzi: '患难见真情，日久见人心。', pinyin: 'huàn nàn jiàn zhēn qíng, rì jiǔ jiàn rén xīn.' },
{ hanzi: '桃花潭水深千尺，不及汪伦送我情。', pinyin: 'táo huā tán shuǐ shēn qiān chǐ, bù jí wāng lún sòng wǒ qíng.' },
{ hanzi: '劝君更尽一杯酒，西出阳关无故人。', pinyin: 'quàn jūn gèng jìn yī bēi jiǔ, xī chū yáng guān wú gù rén.' },
{ hanzi: '莫愁前路无知己，天下谁人不识君。', pinyin: 'mò chóu qián lù wú zhī jǐ, tiān xià shuí rén bù shí jūn.' },
{ hanzi: '人生得一知己足矣，斯世当以同怀视之。', pinyin: 'rén shēng dé yī zhī jǐ zú yǐ, sī shì dāng yǐ tóng huái shì zhī.' },
{ hanzi: '朋友是冬天的太阳，夏天的凉风。', pinyin: 'péng yǒu shì dōng tiān de tài yáng, xià tiān de liáng fēng.' },
{ hanzi: '真正的朋友不是在你得意时陪着你的人，而是在你失意时依然陪着你的人。', pinyin: 'zhēn zhèng de péng yǒu bù shì zài nǐ dé yì shí péi zhe nǐ de rén, ér shì zài nǐ shī yì shí yī rán péi zhe nǐ de rén.' },
{ hanzi: '友情就像一棵树，需要用心去浇灌。', pinyin: 'yǒu qíng jiù xiàng yī kē shù, xū yào yòng xīn qù jiāo guàn.' },
{ hanzi: '没有朋友的人，就像生活在荒岛上。', pinyin: 'méi yǒu péng yǒu de rén, jiù xiàng shēng huó zài huāng dǎo shàng.' },
{ hanzi: '朋友是人生的财富，珍惜每一个朋友。', pinyin: 'péng yǒu shì rén shēng de cái fù, zhēn xī měi yī gè péng yǒu.' },
{ hanzi: '亲情是永恒的，友情是珍贵的。', pinyin: 'qīn qíng shì yǒng héng de, yǒu qíng shì zhēn guì de.' },
{ hanzi: '血浓于水，亲情最珍贵。', pinyin: 'xuè nóng yú shuǐ, qīn qíng zuì zhēn guì.' },
{ hanzi: '父母恩情深似海，报答之心永不忘。', pinyin: 'fù mǔ ēn qíng shēn sì hǎi, bào dá zhī xīn yǒng bù wàng.' },
{ hanzi: '儿女是父母的骄傲，父母是儿女的依靠。', pinyin: 'ér nǚ shì fù mǔ de jiāo ào, fù mǔ shì ér nǚ de yī kào.' },
{ hanzi: '一家人最重要的是和和睦睦。', pinyin: 'yī jiā rén zuì zhòng yào de shì hé hé mù mù.' },
{ hanzi: '兄弟姐妹是父母送给我们的最好礼物。', pinyin: 'xiōng dì jiě mèi shì fù mǔ sòng gěi wǒ men de zuì hǎo lǐ wù.' },
{ hanzi: '有家才有温暖，有爱才有幸福。', pinyin: 'yǒu jiā cái yǒu wēn nuǎn, yǒu ài cái yǒu xìng fú.' },
{ hanzi: '家是避风港，爱是避风港的灯塔。', pinyin: 'jiā shì bì fēng gǎng, ài shì bì fēng gǎng de dēng tǎ.' },
{ hanzi: '父母的微笑是儿女最大的幸福。', pinyin: 'fù mǔ de wēi xiào shì ér nǚ zuì dà de xìng fú.' },
{ hanzi: '陪伴是最长情的告白。', pinyin: 'péi bàn shì zuì cháng qíng de gào bái.' },
{ hanzi: '常回家看看，父母在等你。', pinyin: 'cháng huí jiā kàn kàn, fù mǔ zài děng nǐ.' },
{ hanzi: '父母在，家就在。', pinyin: 'fù mǔ zài, jiā jiù zài.' },
{ hanzi: '没有父母，就没有我们。', pinyin: 'méi yǒu fù mǔ, jiù méi yǒu wǒ men.' },
{ hanzi: '感谢父母养育之恩，永世难忘。', pinyin: 'gǎn xiè fù mǔ yǎng yù zhī ēn, yǒng shì nán wàng.' },
{ hanzi: '书籍是人类进步的阶梯。', pinyin: 'shū jí shì rén lèi jìn bù de jiē tī.' },
{ hanzi: '知识就是力量。', pinyin: 'zhī shí jiù shì lì liàng.' },
{ hanzi: '时间就是金钱。', pinyin: 'shí jiān jiù shì jīn qián.' },
{ hanzi: '健康是最大的财富。', pinyin: 'jiàn kāng shì zuì dà de cái fù.' },

{ hanzi: '友谊第一，比赛第二。', pinyin: 'yǒu yì dì yī, bǐ sài dì èr.' },
{ hanzi: '助人为快乐之本。', pinyin: 'zhù rén wéi kuài lè zhī běn.' }

                    this.audio.volume = this.volume;
                    this.audio.addEventListener('ended', () => {
                        this.nextTrack();
                    });
                    console.log('音乐播放器初始化完成（在线版本）');
                }
            },
                { name: '专注学习', path: 'https://assets.mixkit.co/music/preview/mixkit-driving-ambition-32.mp3' }
            ],
            init: function() {
                if (this.isEnabled) {
                    this.audio = new Audio();
                    this.audio.volume = this.volume;
                    this.audio.addEventListener('ended', () => {
                        this.nextTrack();
                    });
                    console.log('🎵 音乐播放器初始化完成（在线版本）');
                }
            },
                { name: '清晰', path: '' }
            ]
        };

        // ============================================
        // 工具函数
        // ============================================
        
        // 获取指定模式的所有题目
        function getAllQuestions(mode) {
            switch(mode) {
                case 'single':
                    return [...singleWords];
                case 'triple':
                    return [...tripleWords];
                case 'sentence':
                    return [...sentences];
                case 'idiom':
                    return [...idioms];
                default:
                    return [...singleWords];
            }
        }

        // 随机打乱数组
        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // 获取当前模式的题库信息
        function getLibraryInfo(mode) {
            const allQuestions = getAllQuestions(mode);
            const count = allQuestions.length;
            
            switch(mode) {
                case 'single':
                    return {
                        title: '单字题库',
                        count: `${count} 汉字`,
                        desc: '覆盖常用汉字，包含多音字示例',
                        color: '#3498db'
                    };
                case 'triple':
                    return {
                        title: '三字题库',
                        count: `${count} 词语`,
                        desc: '常用三字词语、名词和短语',
                        color: '#2ecc71'
                    };
                case 'sentence':
                    return {
                        title: '句子题库',
                        count: `${count} 句子`,
                        desc: '日常短句、古诗词名句、励志短句',
                        color: '#9b59b6'
                    };
                case 'idiom':
                    return {
                        title: '成语题库',
                        count: `${count} 成语`,
                        desc: '常用四字成语，包含多音字',
                        color: '#f39c12'
                    };
                default:
                    return {
                        title: '单字题库',
                        count: `${count} 汉字`,
                        desc: '覆盖常用汉字，包含多音字示例',
                        color: '#3498db'
                    };
            }
        }

        // 根据上下文获取正确的拼音
        function getContextualPinyin(hanzi, context) {
            if (polyphoneMap[hanzi]) {
                for (const [phrase, pinyin] of Object.entries(polyphoneMap[hanzi])) {
                    if (context.includes(phrase)) {
                        return pinyin;
                    }
                }
            }
            return null;
        }

        // 清理拼音字符串中的标点符号
        function cleanPinyinString(pinyinStr) {
            // 将拼音字符串按空格分割
            const parts = pinyinStr.split(' ');
            const cleanedParts = [];
            
            for (const part of parts) {
                // 移除拼音末尾的标点符号
                let cleaned = part.replace(/[，。！？；："'、…《》（）【】［］｛｝「」『』<>〔〕〖〗·．·•～—.,!?;:]+$/, '');
                if (cleaned) {
                    cleanedParts.push(cleaned);
                }
            }
            
            return cleanedParts;
        }
        
        // ============================================
        // 音乐控制函数
        // ============================================
        
        // 初始化音乐播放器
        function initMusicPlayer() {
            if (!musicPlayer.audio) {
                musicPlayer.audio = new Audio();
                musicPlayer.audio.volume = musicPlayer.volume;
                musicPlayer.audio.loop = true; // 循环播放
                
                // 音频加载完成时更新显示
                musicPlayer.audio.addEventListener('loadeddata', function() {
                    updateMusicDisplay();
                });
                
                // 音频结束时切换到下一首
                musicPlayer.audio.addEventListener('ended', function() {
                    nextMusic();
                });
                
                // 加载第一首音乐
                loadCurrentTrack();
            }
            
            updateMusicDisplay();
        }
        
        // 加载当前曲目
        function loadCurrentTrack() {
            if (musicPlayer.tracks.length === 0) return;
            
            const track = musicPlayer.tracks[musicPlayer.currentTrack];
            musicPlayer.audio.src = track.path;
            document.getElementById('miniCurrentMusic').textContent = track.name;
            
            if (musicPlayer.isEnabled && musicPlayer.isPlaying) {
                musicPlayer.audio.play().catch(e => {
                    console.log('自动播放被阻止，需要用户交互');
                });
            }
        }
        

        
        // ============================================
        // 小型音乐控制栏函数
        // ============================================
        
        // 切换音乐开关
        function toggleMusic() {
            musicPlayer.isEnabled = !musicPlayer.isEnabled;
            const musicIcon = document.getElementById('miniMusicIcon');
            
            if (musicPlayer.isEnabled) {
                musicIcon.textContent = '🎵';
                if (musicPlayer.isPlaying) {
                    musicPlayer.audio.play().catch(e => {
                        console.log('播放失败');
                    });
                }
            } else {
                musicIcon.textContent = '🔇';
                musicPlayer.audio.pause();
            }
        }
        
        // 切换播放/暂停
        function togglePlayPause() {
            if (!musicPlayer.isEnabled) return;
            
            musicPlayer.isPlaying = !musicPlayer.isPlaying;
            const playPauseIcon = document.getElementById('miniPlayPauseIcon');
            
            if (musicPlayer.isPlaying) {
                musicPlayer.audio.play().catch(e => {
                    console.log('播放失败');
                    musicPlayer.isPlaying = false;
                    playPauseIcon.textContent = '▶️';
                });
                playPauseIcon.textContent = '⏸️';
            } else {
                musicPlayer.audio.pause();
                playPauseIcon.textContent = '▶️';
            }
        }
        
        // 上一首音乐
        function prevMusic() {
            if (musicPlayer.tracks.length === 0) return;
            
            musicPlayer.currentTrack--;
            if (musicPlayer.currentTrack < 0) {
                musicPlayer.currentTrack = musicPlayer.tracks.length - 1;
            }
            
            loadCurrentTrack();
            if (musicPlayer.isEnabled && musicPlayer.isPlaying) {
                musicPlayer.audio.play().catch(e => {
                    console.log('播放失败');
                });
            }
        }
        
        // 下一首音乐
        function nextMusic() {
            if (musicPlayer.tracks.length === 0) return;
            
            musicPlayer.currentTrack++;
            if (musicPlayer.currentTrack >= musicPlayer.tracks.length) {
                musicPlayer.currentTrack = 0;
            }
            
            loadCurrentTrack();
            if (musicPlayer.isEnabled && musicPlayer.isPlaying) {
                musicPlayer.audio.play().catch(e => {
                    console.log('播放失败');
                });
            }
        }
        
        // 改变音量
        function changeVolume(value) {
            const volume = parseInt(value) / 100;
            musicPlayer.volume = volume;
            
            if (musicPlayer.audio) {
                musicPlayer.audio.volume = volume;
            }
            
            document.getElementById('miniVolumeValue').textContent = value + '%';
        }
        
        // 更新音乐显示
        function updateMusicDisplay() {
            // 更新当前音乐名称
            if (musicPlayer.tracks.length > 0) {
                const track = musicPlayer.tracks[musicPlayer.currentTrack];
                document.getElementById('miniCurrentMusic').textContent = track.name;
            }
            
            // 更新播放/暂停图标
            const miniPlayPauseIcon = document.getElementById('miniPlayPauseIcon');
            miniPlayPauseIcon.textContent = musicPlayer.isPlaying ? '⏸️' : '▶️';
            
            // 更新音乐开关图标
            const miniMusicIcon = document.getElementById('miniMusicIcon');
            miniMusicIcon.textContent = musicPlayer.isEnabled ? '🎵' : '🔇';
            
            // 更新音量显示
            const volumeValue = Math.round(musicPlayer.volume * 100);
            document.getElementById('miniVolumeSlider').value = volumeValue;
            document.getElementById('miniVolumeValue').textContent = volumeValue + '%';
        }
        
        // ============================================
        // 显示拼音和汉字
        function displayPinyinAndHanzi(question) {
            const pinyinDisplay = document.getElementById('pinyinDisplay');
            pinyinDisplay.innerHTML = '';
            
            const hanzi = question.hanzi;
            const pinyin = question.pinyin;
            
            // 清理拼音字符串，移除拼音中的标点符号
            const pinyinWords = cleanPinyinString(pinyin);
            
            let pinyinIndex = 0;
            
            for (let i = 0; i < hanzi.length; i++) {
                const char = hanzi[i];
                
                // 判断字符是否为汉字（排除标点符号和空格）
                const isChineseChar = /[\u4e00-\u9fff]/.test(char);
                const isPunctuation = /[，。！？；："'、…《》（）【】［］｛｝「」『』<>〔〕〖〗·．·•～—]/.test(char);
                const isSpace = /\s/.test(char);
                
                const wordElement = document.createElement('div');
                wordElement.className = 'pinyin-word';
                
                // 如果是汉字且开启了提示，显示拼音
                if (isChineseChar && appState.showHint && pinyinWords[pinyinIndex]) {
                    const pinyinElement = document.createElement('div');
                    pinyinElement.className = 'pinyin-text';
                    pinyinElement.textContent = pinyinWords[pinyinIndex];
                    wordElement.appendChild(pinyinElement);
                    pinyinIndex++;
                }
                
                const hanziElement = document.createElement('div');
                hanziElement.className = 'hanzi-text';
                hanziElement.textContent = char;
                
                // 如果是标点符号，应用不同的样式
                if (isPunctuation) {
                    hanziElement.style.fontSize = '1.5em';
                    hanziElement.style.margin = '0 5px';
                    hanziElement.style.opacity = '0.7';
                    hanziElement.style.fontWeight = 'normal';
                    // 对于某些标点符号，调整垂直位置
                    if (/[，。、]/.test(char)) {
                        hanziElement.style.marginTop = '20px';
                    }
                }
                
                wordElement.appendChild(hanziElement);
                pinyinDisplay.appendChild(wordElement);
            }
        }

        // 更新统计信息显示
        function updateStatsDisplay() {
            document.getElementById('currentScore').textContent = appState.score;
            document.getElementById('accuracyRate').textContent = appState.totalQuestions > 0 ? 
                Math.round((appState.correctAnswers / appState.totalQuestions) * 100) + '%' : '0%';
            document.getElementById('currentQuestion').textContent = 
                `${appState.currentIndex + 1} / ${appState.totalQuestions}`;
            document.getElementById('elapsedTime').textContent = Math.floor(appState.elapsedTime) + 's';
            
            // 更新进度条
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            const progress = (appState.currentIndex / appState.totalQuestions) * 100;
            
            progressFill.style.width = progress + '%';
            progressText.textContent = `${appState.currentIndex + 1} / ${appState.totalQuestions}`;
            
            // 更新题目编号
            document.getElementById('questionNumber').textContent = `第 ${appState.currentIndex + 1} 题`;
        }

        // 显示反馈消息
        function showFeedback(message, type) {
            const feedbackElement = document.getElementById('feedbackMessage');
            feedbackElement.textContent = message;
            feedbackElement.className = `feedback-message ${type}`;
            feedbackElement.classList.remove('hidden');
            
            // 添加更明显的动画效果
            feedbackElement.style.animation = 'none';
            setTimeout(() => {
                feedbackElement.style.animation = 'fadeIn 0.5s ease, pulse 1s infinite';
            }, 10);
            
            setTimeout(() => {
                feedbackElement.classList.add('hidden');
            }, type === 'complete' ? 5000 : 3000); // 增加正确和错误反馈的显示时间
        }

        // 开始计时器
        function startTimer() {
            appState.startTime = Date.now();
            appState.timerInterval = setInterval(() => {
                appState.elapsedTime = (Date.now() - appState.startTime) / 1000;
                updateStatsDisplay();
            }, 1000);
        }

        // 停止计时器
        function stopTimer() {
            if (appState.timerInterval) {
                clearInterval(appState.timerInterval);
                appState.timerInterval = null;
            }
        }

        // 重置应用程序状态
        function resetAppState() {
            appState.currentQuestions = [];
            appState.currentIndex = 0;
            appState.score = 0;
            appState.correctAnswers = 0;
            // totalQuestions 将在 generateNewQuestions 中动态设置
            appState.totalQuestions = 0;
            appState.startTime = null;
            appState.elapsedTime = 0;
            appState.errorList = [];
            stopTimer();
        }

        // ============================================
        // 核心业务逻辑
        // ============================================

        // 更新所有选项卡的数量显示
        function updateAllTabCounts() {
            const modes = ['single', 'triple', 'sentence', 'idiom'];
            
            modes.forEach(mode => {
                const libraryInfo = getLibraryInfo(mode);
                const tab = document.querySelector(`[data-mode="${mode}"]`);
                if (tab) {
                    const smallElement = tab.querySelector('small');
                    if (smallElement) {
                        smallElement.textContent = libraryInfo.count;
                    }
                }
            });
        }

        // 切换练习模式
        function switchMode(mode) {
            // 更新UI激活状态
            document.querySelectorAll('.mode-tab').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            
            // 更新应用程序状态
            appState.currentMode = mode;
            resetAppState();
            
            // 更新题库信息显示
            const libraryInfo = getLibraryInfo(mode);
            document.getElementById('libraryTitle').textContent = libraryInfo.title;
            document.getElementById('libraryCount').textContent = libraryInfo.count;
            document.getElementById('libraryDesc').textContent = libraryInfo.desc;
            
            // 生成新题目
            generateNewQuestions();
            
            // 重置输入框
            const inputField = document.getElementById('userInput');
            inputField.value = '';
            inputField.className = 'input-field';
            inputField.focus();
            
            // 显示第一个题目
            displayCurrentQuestion();
            startTimer();
            
            // 为question-card添加/移除模式类
            const questionCard = document.getElementById('questionCard');
            questionCard.classList.remove('sentence-mode', 'single-mode', 'triple-mode', 'idiom-mode');
            questionCard.classList.add(`${mode}-mode`);
        }

        // 生成新的题目集合
        function generateNewQuestions() {
            const allQuestions = getAllQuestions(appState.currentMode);
            const shuffledQuestions = shuffleArray(allQuestions);
            
            // 动态设置每轮题目数量为题库的实际长度
            appState.questionsPerRound = allQuestions.length;
            
            appState.currentQuestions = shuffledQuestions.slice(0, appState.questionsPerRound);
            appState.currentIndex = 0;
            appState.totalQuestions = appState.currentQuestions.length;
            
            // 更新统计显示
            updateStatsDisplay();
        }

        // 显示当前题目
        function displayCurrentQuestion() {
            if (appState.currentIndex < appState.currentQuestions.length) {
                const question = appState.currentQuestions[appState.currentIndex];
                displayPinyinAndHanzi(question);
            } else {
                // 所有题目完成
                completePractice();
            }
        }

        // 处理答案提交
        function submitAnswer() {
            const inputField = document.getElementById('userInput');
            const userAnswer = inputField.value.trim();
            
            if (!userAnswer) {
                showFeedback('请输入答案后再提交！', 'error');
                return;
            }
            
            const currentQuestion = appState.currentQuestions[appState.currentIndex];
            const correctAnswer = currentQuestion.hanzi;
            
            // 判断答案是否正确
            const isCorrect = userAnswer === correctAnswer;
            
            if (isCorrect) {
                // 正确回答
                inputField.className = 'input-field correct';
                appState.score += 10;
                appState.correctAnswers++;
                
                showFeedback('✅ 回答正确！+10分', 'correct');
                
                // 延迟后进入下一题
                setTimeout(() => {
                    appState.currentIndex++;
                    inputField.value = '';
                    inputField.className = 'input-field';
                    
                    if (appState.currentIndex < appState.currentQuestions.length) {
                        displayCurrentQuestion();
                        inputField.focus();
                    } else {
                        completePractice();
                    }
                    
                    updateStatsDisplay();
                }, 1000);
            } else {
                // 错误回答
                inputField.className = 'input-field error';
                
                // 记录错题
                appState.errorList.push({
                    question: currentQuestion,
                    userAnswer: userAnswer,
                    timestamp: Date.now()
                });
                
                showFeedback(`❌ 回答错误！正确答案：${correctAnswer}`, 'error');
                
                // 不清空输入框，让用户修改
                setTimeout(() => {
                    inputField.className = 'input-field';
                }, 500);
            }
        }

        // 完成所有练习
        function completePractice() {
            stopTimer();
            
            const accuracy = appState.totalQuestions > 0 ? 
                Math.round((appState.correctAnswers / appState.totalQuestions) * 100) : 0;
            
            showFeedback(
                `🎉 通关成功！总分：${appState.score}，正确率：${accuracy}%`,
                'complete'
            );
            
            // 更新最高分记录
            if (appState.score > appState.stats.bestScore) {
                appState.stats.bestScore = appState.score;
            }
            
            // 更新统计数据
            appState.stats.totalPractice++;
            appState.stats.totalCorrect += appState.correctAnswers;
            appState.stats.totalErrors += appState.errorList.length;
            appState.stats.averageAccuracy = 
                Math.round(appState.stats.totalCorrect / (appState.stats.totalPractice * appState.questionsPerRound) * 100);
            
            // 清空题目显示区域
            const pinyinDisplay = document.getElementById('pinyinDisplay');
            pinyinDisplay.innerHTML = '<div class="pinyin-word"><div class="hanzi-text">🎉</div></div><div class="pinyin-word"><div class="hanzi-text">完</div></div><div class="pinyin-word"><div class="hanzi-text">成</div></div>';
        }

        // ============================================
        // UI交互处理函数
        // ============================================

        // 换一批题目
        function shuffleQuestions() {
            generateNewQuestions();
            displayCurrentQuestion();
            
            const inputField = document.getElementById('userInput');
            inputField.value = '';
            inputField.className = 'input-field';
            inputField.focus();
        }

        // 重置进度
        function resetProgress() {
            console.log('resetProgress函数被调用 - 开始重置');
            // 直接重置，无需确认弹窗
            resetAppState();
            generateNewQuestions();
            displayCurrentQuestion();
            
            const inputField = document.getElementById('userInput');
            inputField.value = '';
            inputField.className = 'input-field';
            inputField.focus();
            
            updateStatsDisplay();
            // 移除反馈消息显示
            console.log('resetProgress函数执行完成 - 重置成功');
        }

        // 处理键盘按键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                submitAnswer();
            }
        }



        // 显示错题本
        function showErrorList() {
            if (appState.errorList.length === 0) {
                showFeedback('📝 目前还没有错题记录', 'correct');
                return;
            }
            
            let errorMessage = '📝 错题本：\n\n';
            appState.errorList.forEach((error, index) => {
                errorMessage += `${index + 1}. 题目：${error.question.hanzi}\n`;
                errorMessage += `   你的答案：${error.userAnswer}\n`;
                errorMessage += `   正确答案：${error.question.hanzi}\n\n`;
            });
            
            alert(errorMessage);
        }

        // 切换难度
        function toggleDifficulty() {
            appState.difficulty = appState.difficulty === 'easy' ? 'hard' : 'easy';
            appState.showHint = appState.difficulty === 'easy';
            
            displayCurrentQuestion();
            showFeedback(
                appState.difficulty === 'easy' ? '⚙️ 已切换到简单模式' : '⚙️ 已切换到困难模式',
                'correct'
            );
        }

        // 显示统计信息
        function showStats() {
            const statsMessage = `
📊 练习统计数据：

总练习次数：${appState.stats.totalPractice} 次
历史最高分：${appState.stats.bestScore} 分
累计正确：${appState.stats.totalCorrect} 题
累计错误：${appState.stats.totalErrors} 题
平均正确率：${appState.stats.averageAccuracy}%

当前练习：
得分：${appState.score} 分
正确率：${Math.round((appState.correctAnswers / appState.totalQuestions) * 100)}%
用时：${Math.floor(appState.elapsedTime)} 秒
错题数：${appState.errorList.length} 题
            `.trim();
            
            alert(statsMessage);
        }

        // ============================================
        // 初始化应用程序
        // ============================================

        // 页面加载完成后初始化
        function initializeApp() {
            // 首先更新所有选项卡的数量显示
            updateAllTabCounts();
            
            // 初始化音乐播放器
            initMusicPlayer();
            
            // 设置初始模式
            switchMode('single');
            
            // 加载统计信息（如果有本地存储）
            try {
                const savedStats = localStorage.getItem('pinyinTypingStats');
                if (savedStats) {
                    appState.stats = JSON.parse(savedStats);
                }
            } catch (e) {
                console.log('无法加载统计信息');
            }
            
            // 输入框自动聚焦
            const inputField = document.getElementById('userInput');
            inputField.focus();
            
            // 添加输入框触摸优化
            inputField.addEventListener('touchstart', function() {
                this.focus();
            });
            
            // 添加阻止双击缩放
            let lastTouchEnd = 0;
            document.addEventListener('touchend', function(event) {
                const now = (new Date()).getTime();
                if (now - lastTouchEnd <= 300) {
                    event.preventDefault();
                }
                lastTouchEnd = now;
            }, false);
        }

        // 页面关闭时保存统计信息
        window.addEventListener('beforeunload', function() {
            try {
                localStorage.setItem('pinyinTypingStats', JSON.stringify(appState.stats));
            } catch (e) {
                console.log('无法保存统计信息');
            }
        });

        // 页面加载完成后执行初始化
        window.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
